<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>2026 鱼跃龙门</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft YaHei", sans-serif;
      background: linear-gradient(to bottom, #003366, #3399ff);
      color: #fff;
      text-align: center;
    }
    header {
      padding: 50px 20px;
      background: rgba(0,0,0,0.3);
    }
    header h1 {
      font-size: 3em;
      margin: 0;
    }
    header p {
      font-size: 1.2em;
      margin-top: 10px;
    }
    main {
      padding: 40px 20px;
    }
    .dragon-gate {
      font-size: 2em;
      margin: 30px 0;
      animation: jump 2s infinite;
    }
    @keyframes jump {
      0% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
      100% { transform: translateY(0); }
    }
    footer {
      padding: 20px;
      background: rgba(0,0,0,0.5);
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <header>
    <h1>2026 · 鱼跃龙门</h1>
    <p>寓意新的一年，奋发向上，突破自我</p>
  </header>
  <main>
    <div class="dragon-gate">🐟 跃过龙门 🐉</div>
    <p>愿你在 2026 年，像鲤鱼跃龙门般，迎来新的机遇与成功。</p>
  </main>
  <footer>
    © 2026 鱼跃龙门 · 静态网页示例
  </footer>
</body>
</html>
